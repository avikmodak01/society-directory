<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Panel — Society Directory</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ── Login Screen ─────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-screen">
      <div class="login-card">
        <div class="login-logo">🔐</div>
        <h1>Admin Panel</h1>
        <p>Society Directory · Authorised access only</p>
        <form id="login-form" novalidate>
          <input
            class="login-input"
            type="email"
            id="admin-email"
            placeholder="Admin email address"
            autocomplete="email"
            required
          />
          <input
            class="login-input"
            type="password"
            id="admin-pwd"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <button class="login-btn" type="submit">Login →</button>
        </form>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  </div>

  <!-- ── Dashboard ────────────────────────────────────────────── -->
  <div id="dashboard" hidden>

    <header class="admin-header">
      <div class="admin-header-brand">
        <div class="logo">🏘️</div>
        <div>
          <h1>Admin Panel</h1>
          <p>Society Directory</p>
        </div>
      </div>
      <div class="admin-header-actions">
        <a href="index.html" class="btn-back-home">← Directory</a>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </header>

    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="deletions">
        🗑 Deletion Requests
        <span class="tab-badge" id="del-badge" style="display:none">0</span>
      </button>
      <button class="tab-btn" data-tab="categories">
        🏷 Categories
      </button>
    </div>

    <main class="admin-main">

      <!-- Deletion Requests Tab -->
      <div class="tab-content" data-tab="deletions">
        <p class="section-title">Pending Removal Requests</p>
        <div id="deletions-list">
          <div class="admin-empty">
            <span class="icon">⏳</span>
            <h3>Loading…</h3>
            <p>Fetching deletion requests.</p>
          </div>
        </div>
      </div>

      <!-- Categories Tab -->
      <div class="tab-content" data-tab="categories" hidden>

        <div class="add-category-card">
          <h3>➕ Add New Category</h3>
          <div class="cat-form-row">
            <input class="admin-input emoji-input" id="cat-emoji" type="text"
                   placeholder="🔧" maxlength="4" />
            <input class="admin-input" id="cat-name" type="text"
                   placeholder="Category name" maxlength="30" />
          </div>
          <div class="color-label">Pick a colour</div>
          <div class="color-swatches" id="color-swatches"></div>
          <div class="color-label">Preview</div>
          <div class="cat-preview" id="cat-preview">⭐ Category</div>
          <button class="btn-add-cat" id="btn-add-cat">Add Category</button>
        </div>

        <p class="section-title">Custom Categories</p>
        <div class="custom-cat-list" id="custom-cats-list">
          <p style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:16px 0">Loading…</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Firebase SDK (app + database + auth) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="admin.js"></script>

</body>
</html>
